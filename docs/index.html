<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Footwork Trainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgb(30, 30, 60);
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* Overlay shared styles */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(30, 30, 60, 0.95);
    z-index: 10;
  }
  .overlay.hidden { display: none; }

  /* Start screen */
  #start-screen h1 {
    font-size: clamp(24px, 4vw, 48px);
    margin-bottom: 0.3em;
  }
  #start-screen .subtitle {
    color: #b4b4b4;
    font-size: clamp(14px, 2vw, 22px);
    margin-bottom: 2em;
  }
  .field-group {
    margin-bottom: 1.5em;
    text-align: left;
    width: clamp(240px, 40vw, 360px);
  }
  .field-group label {
    display: block;
    color: #b4b4b4;
    font-size: clamp(12px, 1.5vw, 18px);
    margin-bottom: 0.3em;
  }
  .field-group input {
    width: 100%;
    padding: 0.5em 0.6em;
    font-size: clamp(14px, 1.8vw, 22px);
    background: transparent;
    border: 2px solid #c8c8c8;
    border-radius: 4px;
    color: #fff;
    outline: none;
  }
  .field-group input:focus {
    border-color: #64c8ff;
  }
  .error-msg {
    color: #ff6464;
    font-size: clamp(12px, 1.4vw, 18px);
    min-height: 1.5em;
    margin-top: 0.5em;
  }
  .btn {
    padding: 0.6em 2em;
    font-size: clamp(16px, 2vw, 26px);
    background: rgb(60, 120, 60);
    color: #fff;
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    margin: 0.4em;
  }
  .btn:hover { background: rgb(80, 160, 80); }

  /* End screen */
  #end-screen h1 {
    color: #64ff64;
    font-size: clamp(24px, 4vw, 48px);
    margin-bottom: 1em;
  }
  #end-screen .stat-line {
    font-size: clamp(14px, 2vw, 26px);
    margin-bottom: 0.6em;
  }
  #end-screen .btn-row {
    margin-top: 1.5em;
    display: flex;
    gap: 1em;
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- Start Screen -->
<div id="start-screen" class="overlay">
  <h1>Badminton Footwork Trainer</h1>
  <p class="subtitle">Configure your training session:</p>
  <div class="field-group">
    <label for="inp-duration">Training Duration (seconds)</label>
    <input id="inp-duration" type="number" inputmode="decimal" value="60" min="1" step="1">
  </div>
  <div class="field-group">
    <label for="inp-interval">Reappear Interval (seconds)</label>
    <input id="inp-interval" type="number" inputmode="decimal" value="3" min="0.1" step="0.1">
  </div>
  <div class="field-group">
    <label for="inp-display">Display Duration (seconds)</label>
    <input id="inp-display" type="number" inputmode="decimal" value="1" min="0.1" step="0.1">
  </div>
  <button class="btn" id="btn-start">START</button>
  <p class="error-msg" id="start-error"></p>
</div>

<!-- End Screen -->
<div id="end-screen" class="overlay hidden">
  <h1>Training Complete!</h1>
  <div id="end-stats"></div>
  <div class="btn-row">
    <button class="btn" id="btn-restart">Restart</button>
    <button class="btn" id="btn-quit">Quit</button>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const DARK_BG   = "rgb(30,30,60)";
const WHITE     = "#ffffff";
const GREEN     = "rgb(34,120,50)";
const NET_COLOR = "rgb(220,220,220)";
const FEATHER_COLOR   = "rgb(255,255,240)";
const FEATHER_OUTLINE = "rgb(180,180,180)";
const CORK_COLOR      = "rgb(200,60,60)";
const CORK_OUTLINE    = "rgb(160,40,40)";
const LABEL_COLOR     = "rgb(255,255,100)";

const BASE_HEIGHT = 700;

// Court fractions
const COURT_W = 6.1, HALF_LEN = 6.7;
const FRAC_SINGLES_INSET  = 0.46 / COURT_W;
const FRAC_SHORT_SERVICE  = (HALF_LEN - 1.98) / HALF_LEN;
const FRAC_LONG_SERVICE   = 0.76 / HALF_LEN;

const POSITIONS = {
  "Front Left":  [0.20, 0.85],
  "Front Right": [0.80, 0.85],
  "Mid Left":    [0.10, 0.50],
  "Mid Right":   [0.90, 0.50],
  "Back Left":   [0.20, 0.15],
  "Back Right":  [0.80, 0.15],
};
const POS_NAMES = Object.keys(POSITIONS);

// ── DOM refs ───────────────────────────────────────────────
const canvas      = document.getElementById("game-canvas");
const ctx         = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const endScreen   = document.getElementById("end-screen");
const startError  = document.getElementById("start-error");
const endStats    = document.getElementById("end-stats");

// ── State ──────────────────────────────────────────────────
let state = "start"; // "start" | "training" | "end"
let courtRect = { x: 0, y: 0, w: 0, h: 0 };
let scale = 1;

// Training state
let trainDuration = 0, trainInterval = 0, trainDisplay = 0;
let trainStart = 0, shuttleCount = 0;
let currentPos = null, shuttleVisible = false;
let lastHideTime = 0, shuttleShowTime = 0;
let animFrameId = null;

// Audio
let audioCtx = null;

// ── Canvas sizing ──────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  scale = canvas.height / BASE_HEIGHT;
  courtRect = computeCourtRect();
}

function computeCourtRect() {
  const topMargin    = 60 * scale;
  const bottomMargin = 40 * scale;
  const sideMargin   = 30 * scale;
  const availW = canvas.width  - 2 * sideMargin;
  const availH = canvas.height - topMargin - bottomMargin;
  const aspect = HALF_LEN / COURT_W;

  let cw = Math.min(availW, availH / aspect);
  let ch = cw * aspect;
  let cx = (canvas.width  - cw) / 2;
  let cy = topMargin + (availH - ch) / 2;
  return { x: cx, y: cy, w: cw, h: ch };
}

window.addEventListener("resize", () => {
  resizeCanvas();
  if (state === "training") drawFrame();
});
resizeCanvas();

// ── Court drawing ──────────────────────────────────────────
function drawCourt() {
  const r = courtRect;
  const lw = Math.max(2, 2 * scale);

  // Green surface
  ctx.fillStyle = GREEN;
  ctx.fillRect(r.x, r.y, r.w, r.h);

  // Outer boundary
  ctx.strokeStyle = WHITE;
  ctx.lineWidth = lw;
  ctx.strokeRect(r.x, r.y, r.w, r.h);

  // Singles sidelines
  const inset = r.w * FRAC_SINGLES_INSET;
  ctx.beginPath();
  ctx.moveTo(r.x + inset, r.y);
  ctx.lineTo(r.x + inset, r.y + r.h);
  ctx.moveTo(r.x + r.w - inset, r.y);
  ctx.lineTo(r.x + r.w - inset, r.y + r.h);
  ctx.stroke();

  // Short service line
  const serviceY = r.y + r.h - r.h * FRAC_SHORT_SERVICE;
  ctx.beginPath();
  ctx.moveTo(r.x, serviceY);
  ctx.lineTo(r.x + r.w, serviceY);
  ctx.stroke();

  // Long service line
  const longY = r.y + r.h - r.h * FRAC_LONG_SERVICE;
  ctx.beginPath();
  ctx.moveTo(r.x, longY);
  ctx.lineTo(r.x + r.w, longY);
  ctx.stroke();

  // Center line
  const centerX = r.x + r.w / 2;
  ctx.beginPath();
  ctx.moveTo(centerX, serviceY);
  ctx.lineTo(centerX, longY);
  ctx.stroke();

  // Net
  const netExtend = 10 * scale;
  ctx.strokeStyle = NET_COLOR;
  ctx.lineWidth = Math.max(4, 4 * scale);
  ctx.beginPath();
  ctx.moveTo(r.x - netExtend, r.y);
  ctx.lineTo(r.x + r.w + netExtend, r.y);
  ctx.stroke();

  // NET label
  ctx.fillStyle = NET_COLOR;
  ctx.font = `${Math.round(20 * scale)}px Arial`;
  ctx.textAlign = "center";
  ctx.textBaseline = "bottom";
  ctx.fillText("NET", r.x + r.w / 2, r.y - 4 * scale);
}

// ── Position helpers ───────────────────────────────────────
function getPositionPixel(name) {
  const [fx, fy] = POSITIONS[name];
  const r = courtRect;
  return {
    x: r.x + r.w * fx,
    y: r.y + r.h - r.h * fy,
  };
}

function pickNextPosition(current) {
  const available = POS_NAMES.filter(p => p !== current);
  return available[Math.floor(Math.random() * available.length)];
}

// ── Shuttlecock drawing ────────────────────────────────────
function drawShuttlecock(x, y, label) {
  const r   = Math.round(18 * scale);
  const cr  = Math.round(7 * scale);
  const lw  = Math.max(1, scale);
  const olw = Math.max(2, 2 * scale);

  // Feather cone (triangle pointing down)
  ctx.fillStyle = FEATHER_COLOR;
  ctx.strokeStyle = FEATHER_OUTLINE;
  ctx.lineWidth = olw;
  ctx.beginPath();
  ctx.moveTo(x - r, y - r);
  ctx.lineTo(x + r, y - r);
  ctx.lineTo(x,     y + r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Feather detail lines
  ctx.lineWidth = lw;
  for (let i = 1; i < 4; i++) {
    const lx = x - r + i * (2 * r / 4);
    ctx.beginPath();
    ctx.moveTo(lx, y - r);
    ctx.lineTo(x,  y + r);
    ctx.stroke();
  }

  // Cork circle
  ctx.fillStyle = CORK_COLOR;
  ctx.beginPath();
  ctx.arc(x, y + r, cr, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = CORK_OUTLINE;
  ctx.lineWidth = lw;
  ctx.stroke();

  // Label
  if (label) {
    ctx.fillStyle = LABEL_COLOR;
    ctx.font = `${Math.round(22 * scale)}px Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(label, x, y + r + cr + 4 * scale);
  }
}

// ── Sound ──────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playHitSound() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const duration = 0.12; // 120ms

    // Oscillator 1: 880 Hz (fundamental)
    const osc1 = audioCtx.createOscillator();
    osc1.type = "sine";
    osc1.frequency.value = 880;
    const gain1 = audioCtx.createGain();
    gain1.gain.setValueAtTime(0.36, now); // 0.6 * 0.6 volume
    gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc1.connect(gain1).connect(audioCtx.destination);

    // Oscillator 2: 1320 Hz
    const osc2 = audioCtx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.value = 1320;
    const gain2 = audioCtx.createGain();
    gain2.gain.setValueAtTime(0.18, now); // 0.3 * 0.6
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc2.connect(gain2).connect(audioCtx.destination);

    // Oscillator 3: 2640 Hz
    const osc3 = audioCtx.createOscillator();
    osc3.type = "sine";
    osc3.frequency.value = 2640;
    const gain3 = audioCtx.createGain();
    gain3.gain.setValueAtTime(0.06, now); // 0.1 * 0.6
    gain3.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc3.connect(gain3).connect(audioCtx.destination);

    osc1.start(now); osc1.stop(now + duration);
    osc2.start(now); osc2.stop(now + duration);
    osc3.start(now); osc3.stop(now + duration);
  } catch (e) {
    // Silently ignore audio errors
  }
}

// ── Drawing a full frame ───────────────────────────────────
function drawFrame() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = DARK_BG;
  ctx.fillRect(0, 0, w, h);

  const now = performance.now() / 1000;
  const elapsed = now - trainStart;
  const remaining = Math.max(0, trainDuration - elapsed);

  // Timer
  const mins = Math.floor(remaining / 60);
  const secs = Math.floor(remaining % 60);
  ctx.fillStyle = WHITE;
  ctx.font = `bold ${Math.round(36 * scale)}px Arial`;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(
    `Time Remaining: ${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`,
    w / 2, 15 * scale
  );

  // Court
  drawCourt();

  // Shuttlecock
  if (shuttleVisible && currentPos) {
    const pos = getPositionPixel(currentPos);
    drawShuttlecock(pos.x, pos.y, currentPos);
  }

  // Shuttle count
  ctx.fillStyle = WHITE;
  ctx.font = `${Math.round(24 * scale)}px Arial`;
  ctx.textAlign = "left";
  ctx.textBaseline = "bottom";
  ctx.fillText(`Shuttles shown: ${shuttleCount}`, 10 * scale, h - 10 * scale);
}

// ── Game loop ──────────────────────────────────────────────
function gameLoop() {
  if (state !== "training") return;

  const now = performance.now() / 1000;
  const elapsed = now - trainStart;
  const remaining = trainDuration - elapsed;

  if (remaining <= 0) {
    endTraining(trainDuration);
    return;
  }

  // Shuttlecock timing
  if (!shuttleVisible) {
    const waitTime = trainInterval - trainDisplay;
    if (now - lastHideTime >= waitTime) {
      currentPos = pickNextPosition(currentPos);
      shuttleVisible = true;
      shuttleShowTime = now;
      shuttleCount++;
      playHitSound();
    }
  } else {
    if (now - shuttleShowTime >= trainDisplay) {
      shuttleVisible = false;
      lastHideTime = now;
    }
  }

  drawFrame();
  animFrameId = requestAnimationFrame(gameLoop);
}

// ── Screen transitions ─────────────────────────────────────
function showScreen(name) {
  state = name;
  startScreen.classList.toggle("hidden", name !== "start");
  endScreen.classList.toggle("hidden", name !== "end");
}

function startTraining(duration, interval, display) {
  trainDuration = duration;
  trainInterval = interval;
  trainDisplay  = display;
  shuttleCount  = 0;
  currentPos    = null;
  shuttleVisible = false;

  const now = performance.now() / 1000;
  trainStart   = now;
  lastHideTime = now - interval; // first shuttlecock appears immediately
  shuttleShowTime = 0;

  showScreen("training");
  animFrameId = requestAnimationFrame(gameLoop);
}

function endTraining(actualDuration) {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;

  endStats.innerHTML = [
    `Total Time: ${actualDuration.toFixed(1)} seconds`,
    `Shuttlecocks Shown: ${shuttleCount}`,
    `Interval: ${trainInterval.toFixed(1)}s &nbsp;|&nbsp; Visible: ${trainDisplay.toFixed(1)}s`,
  ].map(s => `<p class="stat-line">${s}</p>`).join("");

  showScreen("end");
}

// ── Event handlers ─────────────────────────────────────────
document.getElementById("btn-start").addEventListener("click", () => {
  ensureAudio();
  const dur  = parseFloat(document.getElementById("inp-duration").value);
  const ivl  = parseFloat(document.getElementById("inp-interval").value);
  const disp = parseFloat(document.getElementById("inp-display").value);

  if (isNaN(dur) || isNaN(ivl) || isNaN(disp)) {
    startError.textContent = "All fields must be valid numbers!";
    return;
  }
  if (dur <= 0 || ivl <= 0 || disp <= 0) {
    startError.textContent = "All values must be greater than 0!";
    return;
  }
  if (disp >= ivl) {
    startError.textContent = "Display duration must be less than interval!";
    return;
  }
  startError.textContent = "";
  startTraining(dur, ivl, disp);
});

document.getElementById("btn-restart").addEventListener("click", () => {
  showScreen("start");
});

document.getElementById("btn-quit").addEventListener("click", () => {
  showScreen("start");
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && state === "training") {
    const elapsed = performance.now() / 1000 - trainStart;
    endTraining(elapsed);
  }
  if (e.key === "Enter" && state === "start") {
    document.getElementById("btn-start").click();
  }
});

// ── Init ───────────────────────────────────────────────────
showScreen("start");
</script>
</body>
</html>
